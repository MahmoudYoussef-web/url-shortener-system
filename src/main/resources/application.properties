spring.application.name=Url-Shortener

spring.datasource.url=jdbc:mysql://localhost:3306/url_shortener
spring.datasource.username=dev_user
spring.datasource.password=Dev@2026#

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Base URL
app.base-url=http://localhost:8080/api/v1/urls/

# Shards
# MVP: SHARD_COUNT=1, single shard only. Scale this when adding more DB nodes.
app.shards.datasource[0].url=jdbc:mysql://localhost:3306/url_shortener
app.shards.datasource[0].username=dev_user
app.shards.datasource[0].password=${DB_PASSWORD}